services:
    db:
        image: pgvector/pgvector:pg17
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=Newpassword
        ports:
            - '5432:5432'
        volumes:
            - postgres-data:/var/lib/postgresql/data

    adminer:
        image: adminer
        ports:
            - '8080:8080'
volumes:
    postgres-data:
